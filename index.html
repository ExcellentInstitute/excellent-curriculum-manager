<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excellent Institute | Admin Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-section" class="screen-container">
        <div class="auth-card">
            <div class="brand-header">
                <div class="logo-placeholder">EI</div>
                <h2>Excellent Institute</h2>
                <p>Command Center Access</p>
            </div>
            <div class="input-group">
                <input type="password" id="passInput" placeholder="Enter Secure Passcode">
            </div>
            <button id="loginBtn" class="btn-primary">Unlock Dashboard</button>
            <p id="loginError" class="error-text"></p>
        </div>
    </div>

    <div id="dashboard-section" class="screen-container hidden">
        <header class="top-nav">
            <div class="nav-brand">
                <div class="logo-placeholder small">EI</div>
                <h3>Admin Workspace</h3>
            </div>
            <button id="logoutBtn" class="btn-secondary">Lock System</button>
        </header>

        <main class="dashboard-content">
            <div class="dashboard-header">
                <h2>Content Manager</h2>
                <p>Repository auto-scanned. Assign a class and click Publish to send to all student devices.</p>
                <p id="systemStatus" class="status-text" style="text-align: left; margin-top: 10px;"></p>
            </div>

            <div id="content-grid" class="content-grid">
                </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
