<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excellent Institute | Admin Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-section" class="screen-container">
        <div class="auth-card">
            <div class="brand-header">
                <div class="logo-placeholder">EI</div>
                <h2>Excellent Institute</h2>
                <p>Command Center Access</p>
            </div>
            <div class="input-group">
                <input type="password" id="passInput" placeholder="Enter Secure Passcode">
            </div>
            <button id="loginBtn" class="btn-primary">Unlock Dashboard</button>
            <p id="loginError" class="error-text"></p>
        </div>
    </div>

    <div id="dashboard-section" class="screen-container hidden">
        <header class="top-nav">
            <div class="nav-brand">
                <div class="logo-placeholder small">EI</div>
                <h3>Admin Workspace</h3>
            </div>
            <button id="logoutBtn" class="btn-secondary">Lock System</button>
        </header>

        <main class="dashboard-content">
            <div class="upload-card">
                <div class="card-header">
                    <h2>Content Manager</h2>
                    <p>Repository auto-scanned. Select files to push live or pull offline.</p>
                </div>

                <div class="form-grid">
                    <div class="input-group full-width">
                        <label>Target Class</label>
                        <select id="classSelect" class="form-control">
                            <option value="ପ୍ରଥମ ଶ୍ରେଣୀ">ପ୍ରଥମ ଶ୍ରେଣୀ (Class 1)</option>
                            <option value="ଦ୍ୱିତୀୟ ଶ୍ରେଣୀ">ଦ୍ୱିତୀୟ ଶ୍ରେଣୀ (Class 2)</option>
                            </select>
                    </div>

                    <div class="input-group full-width">
                        <label>Subject Name (Exact Odia Text)</label>
                        <input type="text" id="subjectName" class="form-control" placeholder="e.g., ଗଣିତ">
                    </div>

                    <div class="input-group full-width">
                        <label>Select Cover Image (Auto-Scanned)</label>
                        <select id="imageSelect" class="form-control">
                            <option value="">Scanning repository...</option>
                        </select>
                    </div>

                    <div class="input-group full-width">
                        <label>Select Web Material (Auto-Scanned)</label>
                        <select id="materialSelect" class="form-control">
                            <option value="">Scanning repository...</option>
                        </select>
                    </div>
                </div>

                <div class="action-footer" style="display: flex; gap: 10px; margin-top: 20px;">
                    <button id="uploadBtn" class="btn-primary">🚀 Publish Live</button>
                    <button id="offlineBtn" class="btn-secondary" style="border-color: var(--error); color: var(--error);">🛑 Take Offline</button>
                </div>
                <p id="uploadStatus" class="status-text"></p>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
