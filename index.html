<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excellent Institute | Admin Workspace</title>
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SECURE LOGIN SCREEN -->
    <div id="login-section" class="screen-container">
        <div class="auth-card">
            <div class="brand-header">
                <div class="logo-placeholder">EI</div>
                <h2>Excellent Institute</h2>
                <p>Command Center Access</p>
            </div>
            
            <div class="input-group">
                <input type="password" id="passInput" placeholder="Enter Secure Passcode">
            </div>
            <button id="loginBtn" class="btn-primary">Unlock Dashboard</button>
            <p id="loginError" class="error-text"></p>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Hidden by default) -->
    <div id="dashboard-section" class="screen-container hidden">
        <header class="top-nav">
            <div class="nav-brand">
                <div class="logo-placeholder small">EI</div>
                <h3>Admin Workspace</h3>
            </div>
            <button id="logoutBtn" class="btn-secondary">Lock System</button>
        </header>

        <main class="dashboard-content">
            <div class="upload-card">
                <div class="card-header">
                    <h2>Deploy Study Material</h2>
                    <p>Content published here goes live to all student devices across Odisha instantly.</p>
                </div>

                <div class="form-grid">
                    <div class="input-group full-width">
                        <label>Target Class</label>
                        <select id="classSelect" class="form-control">
                            <option value="ପ୍ରଥମ ଶ୍ରେଣୀ">ପ୍ରଥମ ଶ୍ରେଣୀ (Class 1)</option>
                            <option value="ଦ୍ୱିତୀୟ ଶ୍ରେଣୀ">ଦ୍ୱିତୀୟ ଶ୍ରେଣୀ (Class 2)</option>
                            <option value="ତୃତୀୟ ଶ୍ରେଣୀ">ତୃତୀୟ ଶ୍ରେଣୀ (Class 3)</option>
                            <option value="ଚତୁର୍ଥ ଶ୍ରେଣୀ">ଚତୁର୍ଥ ଶ୍ରେଣୀ (Class 4)</option>
                            <option value="ପଞ୍ଚମ ଶ୍ରେଣୀ">ପଞ୍ଚମ ଶ୍ରେଣୀ (Class 5)</option>
                            <option value="ଷଷ୍ଠ ଶ୍ରେଣୀ">ଷଷ୍ଠ ଶ୍ରେଣୀ (Class 6)</option>
                            <option value="ସପ୍ତମ ଶ୍ରେଣୀ">ସପ୍ତମ ଶ୍ରେଣୀ (Class 7)</option>
                            <option value="ଅଷ୍ଟମ ଶ୍ରେଣୀ">ଅଷ୍ଟମ ଶ୍ରେଣୀ (Class 8)</option>
                            <option value="ନବମ ଶ୍ରେଣୀ">ନବମ ଶ୍ରେଣୀ (Class 9)</option>
                            <option value="ଦଶମ ଶ୍ରେଣୀ">ଦଶମ ଶ୍ରେଣୀ (Class 10)</option>
                        </select>
                    </div>

                    <div class="input-group full-width">
                        <label>Subject Name</label>
                        <input type="text" id="subjectName" class="form-control" placeholder="e.g., ଗଣିତ (Must match exactly)">
                    </div>

                    <div class="input-group full-width">
                        <label>Cover Image Link</label>
                        <input type="url" id="imageUrl" class="form-control" placeholder="https://...">
                        <span class="helper-text">Direct link to the book cover image</span>
                    </div>

                    <div class="input-group full-width">
                        <label>Web Material Link</label>
                        <input type="url" id="htmlUrl" class="form-control" placeholder="https://your-github.github.io/...">
                        <span class="helper-text">The GitHub Pages HTML link for the actual notes</span>
                    </div>
                </div>

                <div class="action-footer">
                    <button id="uploadBtn" class="btn-primary large">🚀 Publish Live</button>
                    <p id="uploadStatus" class="status-text"></p>
                </div>
            </div>
        </main>
    </div>

    <!-- The Logic Engine -->
    <script type="module" src="app.js"></script>
</body>
</html>
